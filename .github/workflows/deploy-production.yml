name: Deploy PatchLab to Production

# Pubblica il sito statico su DominiOK (public_html) via FTPS esplicito.
# GitHub resta l'unica fonte del codice: questo workflow legge il repository
# e carica soltanto i file pubblici del sito, mai la documentazione interna.
#
# Vedi DEPLOY_SETUP.md nella root del repository per la guida operativa
# completa (secrets richiesti, primo deploy, rollback, clean deploy).

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run: prepara e verifica _release/ senza caricare nulla sul server"
        type: boolean
        default: false

# Un solo deploy di produzione alla volta. Un deploy in coda ASPETTA quello
# in corso (non lo annulla): interrompere un trasferimento FTP a metà
# lascerebbe il server in uno stato incoerente, quindi cancel-in-progress
# resta false di proposito.
concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Build release and deploy via FTPS
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@2.37.2
        with:
          php-version: '8.2'
          coverage: none

      - name: Lint PHP (php -l) su tutti i file PHP del progetto
        run: |
          set -e
          php_files=$(find . -type f -name "*.php" -not -path "./_release/*")
          echo "File PHP da controllare:"
          echo "$php_files"
          status=0
          while IFS= read -r file; do
            if ! php -l "$file"; then
              status=1
            fi
          done <<< "$php_files"
          if [ "$status" -ne 0 ]; then
            echo "::error::Lint PHP fallito su almeno un file. Deploy interrotto."
            exit 1
          fi

      - name: Test funzionale endpoint (nessun invio email reale, nessuna credenziale disponibile)
        # Nota: config/patchlab-mail.php non esiste in questo ambiente (nessuna
        # credenziale reale nel repository, per costruzione). Il test dedicato
        # a questo scenario (tests/smoke-test.sh, "Dati validi, configurazione
        # SMTP assente") si aspetta esplicitamente HTTP 500 come esito CORRETTO
        # e non lo tratta come fallimento: fallisce solo se la risposta non è
        # JSON pulito, è vuota, contiene uno stack trace/credenziale, o se il
        # codice HTTP non è quello atteso per lo specifico test in corso.
        run: |
          set -e
          PATCHLAB_RATE_LIMIT_SECONDS=0 php -S 127.0.0.1:8000 -t . >/tmp/php-server.log 2>&1 &
          server_pid=$!

          # Attende che il server integrato risponda, senza sleep fissi lunghi.
          for i in $(seq 1 20); do
            if curl -s -o /dev/null "http://127.0.0.1:8000/"; then
              break
            fi
            sleep 0.5
          done

          chmod +x tests/smoke-test.sh
          test_status=0
          tests/smoke-test.sh "http://127.0.0.1:8000" || test_status=1

          kill "$server_pid" 2>/dev/null || true

          if [ "$test_status" -ne 0 ]; then
            echo "::error::Test funzionale dell'endpoint fallito. Deploy interrotto."
            cat /tmp/php-server.log || true
            exit 1
          fi

      - name: Verifica presenza dei GitHub Secrets richiesti
        id: check-secrets
        env:
          FTP_SERVER: ${{ secrets.PATCHLAB_FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.PATCHLAB_FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.PATCHLAB_FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.PATCHLAB_FTP_PORT }}
        run: |
          missing=0
          for name in FTP_SERVER FTP_USERNAME FTP_PASSWORD FTP_PORT; do
            value="${!name}"
            if [ -z "$value" ]; then
              echo "::error::Secret mancante: $name non è configurato in Settings → Secrets and variables → Actions (environment 'production')."
              missing=1
            fi
          done
          if [ "$missing" -eq 1 ]; then
            echo "::error::Deploy interrotto: configura tutti i secrets richiesti prima di rilanciare il workflow. Vedi DEPLOY_SETUP.md."
            exit 1
          fi
          echo "Tutti i secrets richiesti sono presenti."

      - name: Prepara _release/ (whitelist esplicita dei file pubblici)
        run: |
          set -e
          rm -rf _release
          mkdir -p _release

          # Solo i file e le cartelle elencati qui (e in EN_PAGE_DIRS più sotto)
          # finiscono online. Aggiungere una nuova voce esplicitamente quando
          # nasce un nuovo asset pubblico: non copiare mai l'intera root per
          # esclusione.
          # Nota: i *.html elencati qui sono i vecchi stub di redirect verso
          # it/ (pre-Sprint EN/IT); le pagine inglesi reali vivono invece in
          # cartelle dedicate, copiate dal blocco EN_PAGE_DIRS.
          PUBLIC_FILES="index.html patch-pvc.html patch-ricamate.html patch-sublimatiche.html patch-termosaldabili.html patch-velcro.html patch-woven.html portfolio.html preventivo.html style.css main.js"

          for f in $PUBLIC_FILES; do
            if [ -f "$f" ]; then
              cp "$f" "_release/$f"
            else
              echo "::warning::File pubblico atteso non trovato, saltato: $f"
            fi
          done

          if [ -d "assets" ]; then
            mkdir -p _release/assets
            cp -r assets/. _release/assets/
          fi

          if [ -d "it" ]; then
            mkdir -p _release/it
            cp -r it/. _release/it/
          fi

          # Pagine inglesi alla radice (Sprint EN/IT): una cartella per
          # pagina, ciascuna con il proprio index.html, allo stesso modo di
          # it/. Aggiungere qui ogni nuova pagina inglese pubblicata.
          EN_PAGE_DIRS="patch-embroidered patch-woven patch-pvc patch-sublimated patch-hook-and-loop patch-iron-on portfolio how-we-work laboratory quote privacy"
          for d in $EN_PAGE_DIRS; do
            if [ -d "$d" ]; then
              mkdir -p "_release/$d"
              cp -r "$d/." "_release/$d/"
            else
              echo "::warning::Cartella pagina inglese attesa non trovata, saltata: $d"
            fi
          done

          # api/: endpoint PHP pubblico del modulo preventivo. Contiene solo
          # codice, mai credenziali: quelle vivono fuori dal repository (vedi
          # FORM_SETUP.md). config/ NON viene mai copiato qui: è un template
          # di riferimento per Stefano, non un asset del sito pubblico.
          if [ -d "api" ]; then
            mkdir -p _release/api
            cp -r api/. _release/api/
          fi

          # vendor/: PHPMailer ufficiale vendorizzato (vedi FORM_SETUP.md per
          # provenienza e verifica di integrità). Solo codice sorgente e
          # licenza, nessuna configurazione.
          if [ -d "vendor" ]; then
            mkdir -p _release/vendor
            cp -r vendor/. _release/vendor/
          fi

          # robots.txt / sitemap.xml / CNAME: inclusi solo se già presenti nel
          # repository. Non li generiamo qui: nessuna assunzione su contenuti
          # non ancora validati.
          for f in robots.txt sitemap.xml CNAME; do
            if [ -f "$f" ]; then
              cp "$f" "_release/$f"
            fi
          done

      - name: Rimuovi i file .gitkeep da _release/
        run: |
          set -e
          # I .gitkeep servono solo a Git per tracciare cartelle altrimenti
          # vuote (es. assets/img/.gitkeep) e sono file da 0 byte: non hanno
          # alcuna funzione online e alcuni client FTP/TLS chiudono la
          # connessione in modo anomalo su un primo upload a 0 byte.
          find _release -type f -name ".gitkeep" -delete

      - name: Verifica di sicurezza su _release/
        run: |
          set -e
          if [ ! -f "_release/index.html" ]; then
            echo "::error::_release/index.html mancante: la document root non conterrebbe una home page valida."
            exit 1
          fi
          if find _release -iname "*.md" | grep -q .; then
            echo "::error::Trovati file Markdown in _release/: la documentazione non deve mai essere pubblicata."
            exit 1
          fi
          if [ -d "_release/PATCHLAB_MASTER" ] || find _release -iname "*PATCHLAB_MASTER*" | grep -q .; then
            echo "::error::PATCHLAB_MASTER non deve mai comparire in _release/."
            exit 1
          fi
          if [ -d "_release/.github" ] || [ -d "_release/.git" ] || [ -d "_release/.claude" ]; then
            echo "::error::Cartelle di configurazione interne presenti in _release/."
            exit 1
          fi
          if find _release -type f -name ".gitkeep" | grep -q .; then
            echo "::error::Trovati file .gitkeep in _release/: non devono essere pubblicati."
            exit 1
          fi
          if [ -d "_release/config" ]; then
            echo "::error::La cartella config/ non deve mai essere pubblicata (contiene il template della configurazione mailer)."
            exit 1
          fi

          # Ricerca di pattern che assomigliano a credenziali reali già
          # assegnate nel codice PHP pubblicato. L'endpoint non deve MAI
          # contenere una password hardcoded: le credenziali vivono solo nel
          # file di configurazione esterno al repository (vedi FORM_SETUP.md).
          # I pattern cercano un valore non vuoto assegnato, non solo il nome
          # della chiave, per non generare falsi positivi sulla struttura del
          # codice o su placeholder come CHANGE_ME_APPLICATION_PASSWORD.
          if find _release -type f -name "*.php" | grep -q .; then
            if grep -rIEn "smtp_password['\"]?\s*(=>|=)\s*['\"][^'\"]{6,}['\"]" _release --include="*.php" \
                 | grep -viE "change_me|changeme|esempio|example" | grep -q .; then
              echo "::error::Trovata una possibile password SMTP reale hardcoded in un file PHP pubblicato."
              exit 1
            fi
            if grep -rIEn "ZOHO_SMTP_PASSWORD\s*=" _release --include="*.php" | grep -q .; then
              echo "::error::Trovato un riferimento a ZOHO_SMTP_PASSWORD con valore assegnato in un file PHP pubblicato."
              exit 1
            fi
            if grep -rIEn "password\s+applicazione\s*[:=]\s*\S+" _release --include="*.php" | grep -q .; then
              echo "::error::Trovato un possibile valore di password applicazione in un file PHP pubblicato."
              exit 1
            fi
          fi

          echo "Contenuto di _release/ pronto per il deploy:"
          find _release -maxdepth 2 | sort

      - name: Deploy via FTPS esplicito
        if: ${{ !inputs.dry_run }}
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.PATCHLAB_FTP_SERVER }}
          username: ${{ secrets.PATCHLAB_FTP_USERNAME }}
          password: ${{ secrets.PATCHLAB_FTP_PASSWORD }}
          port: ${{ secrets.PATCHLAB_FTP_PORT }}
          protocol: ftps
          # L'account deploy@patchlab.net è già radicato in public_html
          # (confermato: /home/patch864/public_html): la document root del
          # dominio è quindi "./", non "public_html/". Non modificare senza
          # una nuova verifica esplicita sul server.
          server-dir: ./
          local-dir: ./_release/
          log-level: verbose
          exclude: |
            **/.gitkeep
            **/.git*
            **/.git*/**
            **/.DS_Store
            **/Thumbs.db

      - name: Dry run — nessun upload eseguito
        if: ${{ inputs.dry_run }}
        run: |
          echo "dry_run attivo: _release/ è stata generata e verificata, ma non è stato caricato nulla sul server."
